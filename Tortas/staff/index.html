              "on-secondary-fixed-variant": "#7f2924",
              "error-container": "#ffdad6",

              "primary": "#a20513",
              "on-tertiary-fixed": "#001e2f",

              "tertiary-container": "#006e9d",
              "surface-tint": "#b91d20",

              "surface-container-lowest": "#ffffff",

              "on-primary-fixed": "#410003",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .rustic-texture {
            background-color: #fbfbe2;
            background-image: radial-gradient(#e4e4cc 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface font-body text-on-surface rustic-texture min-h-screen flex flex-col items-center justify-center px-6">
<div class="w-full max-w-md space-y-12">
<!-- Logo/Headline Section -->
<header class="text-center space-y-2">
<div class="inline-block mb-4">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(162,5,19,0.2)]">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="restaurant">restaurant</span>
</div>
</div>
<h1 class="font-headline font-black italic text-4xl md:text-5xl text-primary tracking-tighter leading-tight">
                Tortas Doña Susy
            </h1>
</header>
<!-- Main Login Card -->
<main class="bg-surface-container-low p-8 rounded-[2rem] shadow-[0_4px_24px_rgba(27,29,14,0.04)] relative overflow-hidden">
<!-- Asymmetric Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/5 rounded-full blur-3xl"></div>
<form action="#" class="space-y-6 relative z-10" id="loginForm" method="POST">
<!-- Usuario Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-bold text-on-surface-variant ml-1" for="usuario">
                        Usuario
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder-on-surface-variant/40 focus:ring-2 focus:ring-primary transition-all duration-300" id="usuario" name="usuario" placeholder="Tu nombre de usuario" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60">person</span>
</div>
</div>
<!-- Contraseña Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-bold text-on-surface-variant ml-1" for="password">
                        Contraseña
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder-on-surface-variant/40 focus:ring-2 focus:ring-primary transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60">lock</span>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary font-headline font-bold text-lg py-4 rounded-full shadow-lg hover:opacity-90 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                        Iniciar Sesión
                        <span class="material-symbols-outlined text-xl">login</span>
</button>
</div>
<button class="w-full bg-surface-container-highest text-on-surface font-label font-bold text-base py-3 rounded-full hover:bg-surface-container-high active:scale-95 transition-all duration-300 flex items-center justify-center gap-2" onclick="window.history.back()" type="button">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                    Regresar
                </button>
<p class="hidden text-sm font-medium text-error bg-error-container/60 rounded-xl px-4 py-3" id="loginError"></p>
</form>
</main>
<!-- Aesthetic Footer Text -->
<footer class="text-center pt-8">
<div class="flex items-center justify-center gap-4 mb-4">
<div class="h-px w-8 bg-outline-variant/30"></div>
<span class="font-headline italic text-primary font-bold">Desde 2004, sabor que perdura</span>
<div class="h-px w-8 bg-outline-variant/30"></div>
</div>
<p class="text-on-surface-variant/60 text-xs">
                © 2024 Tortas Doña Susy. Todos los derechos reservados.
            </p>
</footer>
</div>
<!-- Background Decorative Elements (Organic Feel) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 blur-[120px] rounded-full"></div>
</div>
<script>
  (function () {
    var form = document.getElementById("loginForm");
    var userInput = document.getElementById("usuario");
    var passInput = document.getElementById("password");
    var errorBox = document.getElementById("loginError");

    if (!form || !userInput || !passInput || !errorBox) return;

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      errorBox.classList.add("hidden");
      errorBox.textContent = "";

      var username = userInput.value.trim();
      var password = passInput.value;

      if (!username || !password) {
        errorBox.textContent = "Ingresa usuario y contraseña.";
        errorBox.classList.remove("hidden");
        return;
      }

      try {
        var response = await fetch("users.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("No se pudo cargar users.json");
        }

        var data = await response.json();
        var users = Array.isArray(data.users) ? data.users : [];
        var isValid = users.some(function (u) {
          return u.username === username && u.password === password;
        });

        if (isValid) {
          window.location.href = "mesas/index.html";
          return;
        }

        errorBox.textContent = "Usuario o contraseña incorrectos.";
        errorBox.classList.remove("hidden");
      } catch (error) {
        errorBox.textContent = "Error al validar acceso. Intenta de nuevo.";
        errorBox.classList.remove("hidden");
      }
    });
  })();
</script>
</body></html>
